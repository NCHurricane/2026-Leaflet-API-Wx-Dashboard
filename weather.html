<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Weather — NCHurricane Dashboard</title>
        <link rel="stylesheet" href="css/shared.css">
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
        <style>
            .display-area.map-area {
                padding: 0;
                overflow: hidden;
            }

            #weather-map {
                width: 100%;
                height: 100%;
                min-height: 600px;
                border-radius: 10px;
            }

            .map-legend {
                background: rgba(15, 23, 42, 0.92);
                border: 1px solid #334155;
                border-radius: 8px;
                padding: 8px 12px;
                color: #e2e8f0;
                font-family: 'Montserrat', system-ui, sans-serif;
                font-size: 0.7rem;
                max-height: 320px;
                overflow-y: auto;
                min-width: 170px;
            }

            .map-legend h4 {
                margin: 0 0 6px;
                font-size: 0.68rem;
                text-transform: uppercase;
                color: #ffff00;
                letter-spacing: 0.05em;
            }

            .legend-row {
                display: flex;
                align-items: center;
                gap: 6px;
                margin-bottom: 3px;
                font-size: 0.65rem;
                text-transform: none;
            }

            .legend-swatch {
                display: inline-block;
                width: 14px;
                height: 14px;
                border-radius: 2px;
                flex-shrink: 0;
                border: 1px solid rgba(255, 255, 255, 0.25);
            }

            .leaflet-control-layers {
                background: rgba(15, 23, 42, 0.92) !important;
                border: 1px solid #334155 !important;
                border-radius: 8px !important;
                color: #e2e8f0 !important;
            }

            .leaflet-control-layers label,
            .leaflet-control-layers-base label {
                color: #e2e8f0 !important;
                font-family: 'Montserrat', system-ui, sans-serif;
                font-size: 0.72rem;
                text-transform: uppercase;
            }

            .leaflet-bar a {
                background-color: #1f1f3e !important;
                color: #e2e8f0 !important;
                border-color: #334155 !important;
            }

            .leaflet-bar a:hover {
                background-color: #3b82f6 !important;
            }

            .leaflet-popup-content-wrapper {
                background: rgba(15, 23, 42, 0.97);
                color: #e2e8f0;
                border: 1px solid #334155;
                border-radius: 8px;
                font-family: 'Montserrat', system-ui, sans-serif;
                font-size: 0.75rem;
            }

            .leaflet-popup-tip {
                background: #0f172a;
            }

            #weather-alerts-count,
            #weather-spc-count,
            #weather-surface-count {
                font-size: 0.65rem;
                color: #ff924e;
                margin-top: 4px;
                display: block;
            }

            .layer-opacity-row {
                display: flex;
                align-items: center;
                gap: 6px;
                margin-top: 4px;
            }

            .layer-opacity-row label {
                font-size: 0.65rem;
                min-width: 55px;
            }

            .layer-opacity-row input[type="range"] {
                flex: 1;
            }

            .refresh-btn {
                margin-top: 6px;
                width: 100%;
                padding: 4px;
                font-size: 0.65rem;
            }

            /* Surface observation markers */
            .sfc-marker {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 32px;
                height: 32px;
                border-radius: 50%;
                font-family: 'Montserrat', system-ui, sans-serif;
                font-size: 0.6rem;
                font-weight: 700;
                color: #fff;
                text-shadow: 0 0 3px rgba(0, 0, 0, 0.9);
                border: 1.5px solid rgba(255, 255, 255, 0.5);
                box-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
                cursor: pointer;
            }

            .sfc-marker.large {
                width: 38px;
                height: 38px;
                font-size: 0.68rem;
            }
        </style>
    </head>

    <body>
        <header>
            <h1><a href="index.html">NCHurricane Dashboard 2026</a></h1>
            <nav id="main-nav"></nav>
        </header>

        <div class="page-layout">

            <!-- LEFT: Controls -->
            <aside class="controls-panel">
                <h2 class="section-title">Weather Controls</h2>

                <div class="style-group">
                    <h3 class="group-title">Region</h3>
                    <label for="weather-region">State / Region</label>
                    <select id="weather-region">
                        <option value="CONUS" selected>CONUS</option>
                        <option value="NC">North Carolina</option>
                        <option value="SC">South Carolina</option>
                        <option value="VA">Virginia</option>
                        <option value="TN">Tennessee</option>
                        <option value="AL">Alabama</option>
                        <option value="AK">Alaska</option>
                        <option value="AZ">Arizona</option>
                        <option value="AR">Arkansas</option>
                        <option value="CA">California</option>
                        <option value="CO">Colorado</option>
                        <option value="CT">Connecticut</option>
                        <option value="DE">Delaware</option>
                        <option value="FL">Florida</option>
                        <option value="GA">Georgia</option>
                        <option value="HI">Hawaii</option>
                        <option value="ID">Idaho</option>
                        <option value="IL">Illinois</option>
                        <option value="IN">Indiana</option>
                        <option value="IA">Iowa</option>
                        <option value="KS">Kansas</option>
                        <option value="KY">Kentucky</option>
                        <option value="LA">Louisiana</option>
                        <option value="ME">Maine</option>
                        <option value="MD">Maryland</option>
                        <option value="MA">Massachusetts</option>
                        <option value="MI">Michigan</option>
                        <option value="MN">Minnesota</option>
                        <option value="MS">Mississippi</option>
                        <option value="MO">Missouri</option>
                        <option value="MT">Montana</option>
                        <option value="NE">Nebraska</option>
                        <option value="NV">Nevada</option>
                        <option value="NH">New Hampshire</option>
                        <option value="NJ">New Jersey</option>
                        <option value="NM">New Mexico</option>
                        <option value="NY">New York</option>
                        <option value="ND">North Dakota</option>
                        <option value="OH">Ohio</option>
                        <option value="OK">Oklahoma</option>
                        <option value="OR">Oregon</option>
                        <option value="PA">Pennsylvania</option>
                        <option value="RI">Rhode Island</option>
                        <option value="SD">South Dakota</option>
                        <option value="TX">Texas</option>
                        <option value="UT">Utah</option>
                        <option value="VT">Vermont</option>
                        <option value="WA">Washington</option>
                        <option value="WV">West Virginia</option>
                        <option value="WI">Wisconsin</option>
                        <option value="WY">Wyoming</option>
                    </select>
                </div>

                <div class="style-group">
                    <h3 class="group-title">Product</h3>
                    <label for="weather-product-group">Product Group</label>
                    <select id="weather-product-group">
                        <option value="alerts" selected>Alerts</option>
                        <option value="spc">SPC Outlooks</option>
                        <option value="surface">Current Obs</option>
                        <option value="mrms">MRMS</option>
                    </select>

                    <div id="weather-alerts-opts" class="weather-product-opts">
                        <label for="weather-alerts-product">Hazard Type</label>
                        <select id="weather-alerts-product">
                            <option value="All Alerts">All Alerts &amp; Warnings</option>
                            <option value="Severe Weather Alerts">Severe Weather Alerts</option>
                            <option value="Severe Weather Warnings">Severe Weather Warnings</option>
                            <option value="Tropical Cyclone Alerts">Tropical Cyclone Alerts</option>
                            <option value="Hydrology Alerts">Hydrology Alerts</option>
                            <option value="Flash Flood Alerts">Flash Flood Alerts</option>
                            <option value="Winter Alerts">Winter Alerts</option>
                            <option value="Cold Alerts">Cold Alerts</option>
                            <option value="Fire Alerts">Fire Alerts</option>
                            <option value="Heat Alerts">Heat Alerts</option>
                            <option value="Coastal Alerts">Coastal Alerts</option>
                            <option value="Marine Alerts">Marine Alerts</option>
                            <option value="Non-Precipitation Alerts">Non-Precipitation Alerts</option>
                        </select>
                        <span id="weather-alerts-count"></span>
                    </div>

                    <div id="weather-spc-opts" class="weather-product-opts" style="display:none;">
                        <label for="weather-spc-day">Outlook Day</label>
                        <select id="weather-spc-day">
                            <option value="1" selected>Day 1</option>
                            <option value="2">Day 2</option>
                            <option value="3">Day 3</option>
                            <option value="4">Day 4</option>
                            <option value="5">Day 5</option>
                            <option value="6">Day 6</option>
                            <option value="7">Day 7</option>
                            <option value="8">Day 8</option>
                        </select>
                        <label for="weather-spc-convective">Convective Outlooks</label>
                        <select id="weather-spc-convective">
                            <option value="" disabled>-- Choose Product --</option>
                            <option value="cat" selected>Categorical</option>
                            <option value="torn">Tornado</option>
                            <option value="wind">Wind</option>
                            <option value="hail">Hail</option>
                            <option value="prob">Probabilistic</option>
                        </select>
                        <label for="weather-spc-fire">Fire Weather Outlooks</label>
                        <select id="weather-spc-fire">
                            <option value="" selected disabled>-- Choose Product --</option>
                            <option value="windrh">Wind / RH</option>
                            <option value="dryt">Dry Thunderstorm</option>
                        </select>
                        <span id="weather-spc-count"></span>
                    </div>

                    <div id="weather-surface-opts" class="weather-product-opts" style="display:none;">
                        <label for="weather-surface-product">Observation Type</label>
                        <select id="weather-surface-product">
                            <option value="temperature" selected>Temperature (&deg;F)</option>
                            <option value="feels_like">Feels Like (&deg;F)</option>
                            <option value="dew_point">Dew Point (&deg;F)</option>
                            <option value="relative_humidity">Relative Humidity (%)</option>
                            <option value="wind_speed">Wind Speed (kt)</option>
                            <option value="wind_gust">Wind Gust (kt)</option>
                        </select>
                        <span id="weather-surface-count"></span>
                    </div>

                    <div id="weather-mrms-opts" class="weather-product-opts" style="display:none;">
                        <label for="weather-mrms-family">Product Family</label>
                        <select id="weather-mrms-family">
                            <option value="PrecipRate" selected>Precipitation Rate</option>
                            <option value="PrecipFlag">Surface Precip Type</option>
                            <option value="QPE">QPE Accumulation</option>
                            <option value="Reflectivity">Reflectivity</option>
                            <option value="RotationTrack">Rotation Tracks</option>
                            <option value="MESH">MESH / Hail</option>
                            <option value="AzShear">Azimuthal Shear</option>
                            <option value="EchoTop">Echo Top</option>
                            <option value="VIL">VIL</option>
                            <option value="SHI">SHI</option>
                            <option value="POSH">POSH</option>
                            <option value="Lightning">Lightning Probability</option>
                            <option value="Model">Model / Environment</option>
                            <option value="RadarQualityIndex">Radar Quality Index</option>
                        </select>

                        <!-- Sub-selectors — shown/hidden by JS based on family -->
                        <div id="mrms-sub-qpe" class="mrms-sub" style="display:none;">
                            <label for="mrms-qpe-source">Source</label>
                            <select id="mrms-qpe-source">
                                <option value="MS2" selected>MultiSensor Pass2</option>
                                <option value="MS1">MultiSensor Pass1</option>
                                <option value="RO">Radar Only</option>
                            </select>
                            <label for="mrms-qpe-period">Period</label>
                            <select id="mrms-qpe-period">
                                <option value="01H" selected>1 Hour</option>
                                <option value="03H">3 Hour</option>
                                <option value="06H">6 Hour</option>
                                <option value="12H">12 Hour</option>
                                <option value="24H">24 Hour</option>
                                <option value="48H">48 Hour</option>
                                <option value="72H">72 Hour</option>
                            </select>
                        </div>

                        <div id="mrms-sub-rotation" class="mrms-sub" style="display:none;">
                            <label for="mrms-rotation-level">Level</label>
                            <select id="mrms-rotation-level">
                                <option value="LL" selected>Low Level (0-2 km)</option>
                                <option value="ML">Mid Level (3-6 km)</option>
                            </select>
                            <label for="mrms-rotation-time">Window</label>
                            <select id="mrms-rotation-time">
                                <option value="30min">30 min</option>
                                <option value="60min" selected>60 min</option>
                                <option value="120min">2 hr</option>
                                <option value="240min">4 hr</option>
                                <option value="360min">6 hr</option>
                                <option value="1440min">24 hr</option>
                            </select>
                        </div>

                        <div id="mrms-sub-mesh" class="mrms-sub" style="display:none;">
                            <label for="mrms-mesh-time">Window</label>
                            <select id="mrms-mesh-time">
                                <option value="Instant" selected>Instant</option>
                                <option value="Max_30min">Max 30 min</option>
                                <option value="Max_60min">Max 60 min</option>
                                <option value="Max_120min">Max 2 hr</option>
                                <option value="Max_240min">Max 4 hr</option>
                                <option value="Max_360min">Max 6 hr</option>
                                <option value="Max_1440min">Max 24 hr</option>
                            </select>
                        </div>

                        <div id="mrms-sub-azshear" class="mrms-sub" style="display:none;">
                            <label for="mrms-azshear-level">Level</label>
                            <select id="mrms-azshear-level">
                                <option value="Low" selected>Low Level (0-2 km)</option>
                                <option value="Mid">Mid Level (3-6 km)</option>
                            </select>
                        </div>

                        <div id="mrms-sub-echotop" class="mrms-sub" style="display:none;">
                            <label for="mrms-echotop-threshold">dBZ Threshold</label>
                            <select id="mrms-echotop-threshold">
                                <option value="18" selected>18 dBZ</option>
                                <option value="30">30 dBZ</option>
                                <option value="50">50 dBZ</option>
                                <option value="60">60 dBZ</option>
                            </select>
                        </div>

                        <div id="mrms-sub-vil" class="mrms-sub" style="display:none;">
                            <label for="mrms-vil-type">Type</label>
                            <select id="mrms-vil-type">
                                <option value="Instant" selected>Instant</option>
                                <option value="Density">Density</option>
                                <option value="Max_120min">Max 2 hr</option>
                                <option value="Max_1440min">Max 24 hr</option>
                            </select>
                        </div>

                        <div id="mrms-sub-reflectivity" class="mrms-sub" style="display:none;">
                            <label for="mrms-refl-variant">Variant</label>
                            <select id="mrms-refl-variant">
                                <option value="HSR" selected>Hybrid Scan (HSR)</option>
                                <option value="BaseQC">Base Reflectivity (QC)</option>
                                <option value="CompLow">Composite &ndash; Low</option>
                                <option value="CompHigh">Composite &ndash; High</option>
                                <option value="CompSuper">Composite &ndash; Super</option>
                                <option value="BREF_1HR_MAX">Base Refl 1hr Max</option>
                                <option value="CREF_1HR_MAX">Comp Refl 1hr Max</option>
                            </select>
                        </div>

                        <div id="mrms-sub-lightning" class="mrms-sub" style="display:none;">
                            <label for="mrms-lightning-window">Window</label>
                            <select id="mrms-lightning-window">
                                <option value="30min" selected>Next 30 min</option>
                                <option value="60min">Next 60 min</option>
                            </select>
                        </div>

                        <div id="mrms-sub-model" class="mrms-sub" style="display:none;">
                            <label for="mrms-model-field">Field</label>
                            <select id="mrms-model-field">
                                <option value="FreezingLevel" selected>Freezing Level Height</option>
                                <option value="SurfaceTemp">Surface Temperature</option>
                                <option value="WetBulbTemp">Wet Bulb Temperature</option>
                            </select>
                        </div>

                        <span id="weather-mrms-status"></span>
                    </div>
                </div>
            </aside>

            <!-- CENTER: Layer controls -->
            <aside class="style-panel">
                <h2 class="section-title">Layer Controls</h2>

                <div class="style-group">
                    <h3 class="group-title">Alerts Layer</h3>
                    <div class="checkbox-row">
                        <label for="weather-show-alerts">Show Alerts</label>
                        <input id="weather-show-alerts" type="checkbox" checked>
                    </div>
                    <div class="layer-opacity-row">
                        <label for="weather-opacity-alerts">Opacity</label>
                        <input id="weather-opacity-alerts" type="range" min="0.1" max="1" step="0.05" value="0.75">
                    </div>
                    <button id="weather-refresh-alerts" class="secondary refresh-btn" type="button">Refresh
                        Alerts</button>
                </div>

                <div class="style-group">
                    <h3 class="group-title">SPC Outlook Layer</h3>
                    <div class="checkbox-row">
                        <label for="weather-show-spc">Show SPC</label>
                        <input id="weather-show-spc" type="checkbox" checked>
                    </div>
                    <div class="layer-opacity-row">
                        <label for="weather-opacity-spc">Opacity</label>
                        <input id="weather-opacity-spc" type="range" min="0.1" max="1" step="0.05" value="0.6">
                    </div>
                    <button id="weather-refresh-spc" class="secondary refresh-btn" type="button">Refresh SPC</button>
                </div>

                <div class="style-group">
                    <h3 class="group-title">Surface Obs Layer</h3>
                    <div class="checkbox-row">
                        <label for="weather-show-surface">Show Obs</label>
                        <input id="weather-show-surface" type="checkbox" checked>
                    </div>
                    <div class="layer-opacity-row">
                        <label for="weather-opacity-surface">Opacity</label>
                        <input id="weather-opacity-surface" type="range" min="0.1" max="1" step="0.05" value="0.9">
                    </div>
                    <button id="weather-refresh-surface" class="secondary refresh-btn" type="button">Refresh
                        Obs</button>
                </div>

                <div class="style-group">
                    <h3 class="group-title">MRMS Layer</h3>
                    <div class="checkbox-row">
                        <label for="weather-show-mrms">Show MRMS</label>
                        <input id="weather-show-mrms" type="checkbox" checked>
                    </div>
                    <div class="layer-opacity-row">
                        <label for="weather-opacity-mrms">Opacity</label>
                        <input id="weather-opacity-mrms" type="range" min="0.1" max="1" step="0.05" value="0.8">
                    </div>
                    <button id="weather-refresh-mrms" class="secondary refresh-btn" type="button">Refresh MRMS</button>
                </div>

                <div class="style-group">
                    <h3 class="group-title">Map Info</h3>
                    <div id="weather-map-status" style="font-size:0.65rem; color:#ff924e;"></div>
                </div>
            </aside>

            <!-- MAIN: Leaflet map -->
            <main class="display-area map-area">
                <div id="weather-map"></div>
            </main>

        </div>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script src="js/shared.js"></script>
        <script src="js/weather.js"></script>
        <script>initNav('weather');</script>
    </body>

</html>
