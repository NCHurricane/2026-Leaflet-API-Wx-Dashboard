                    <label for="radar-level">Level</label>
                    <select id="radar-level">
                        <option value="Level 3">Level 3</option>
                        <option value="Level 2">Level 2</option>
                    </select>

                    <label for="radar-product-l3">Product</label>
                    <select id="radar-product-l3">
                        <option value="N0B">Super-Res Base Reflectivity</option>
                        <option value="N0G">Super-Res Base Velocity</option>
                        <option value="N0M">Correlation Coefficient</option>
                        <option value="NBU">Differential Reflectivity</option>
                        <option value="N0H">Hydrometeor Classification</option>
                        <option value="DVL">Vertically Integrated Liquid</option>
                        <option value="NET">Echo Tops</option>
                        <option value="DHR">1-Hour Precipitation</option>
                        <option value="DPA">Digital Precipitation Array</option>
                        <option value="DTA">Storm Total Precipitation</option>
                    </select>
                    <select id="radar-product-l2" style="display:none;">
                        <option value="reflectivity">Reflectivity</option>
                        <option value="velocity">Velocity</option>
                        <option value="cross_correlation_ratio">Correlation Coeff</option>
                    </select>

                    <div id="radar-sm-inline-controls" style="display:none;">
                        <label for="radar-storm-motion-controls" style="padding-top: 0.5rem;">Storm Relative
                            Velocity Adjustment</label>
                        <label for="radar-sm-speed">Speed</label>
                        <input id="radar-sm-speed" type="range" min="0" max="120" step="1">
                        <label for="radar-sm-dir">Direction</label>
                        <input id="radar-sm-dir" type="range" min="0" max="359" step="1">
                    </div>

                    <label for="radar-source">Source</label>
                    <select id="radar-source">
                        <option value="aws">AWS</option>
                        <option value="gcp">GCP</option>
                        <option value="thredds">THREDDS</option>
                    </select>
                </div>

                <div class="style-group" id="radar-lookback-controls" data-collapsed-default="false">
                    <h3 class="group-title">Short Term Lookback</h3>
                    <label for="radar-quick-range">Time Window</label>
                    <select id="radar-quick-range">
                        <option value="current" selected>Current (latest scan)</option>
                        <option value="0.5">Last 30 min</option>
                        <option value="1">Last 1 hour</option>
                        <option value="1.5">Last 90 min</option>
                        <option value="2">Last 2 hours</option>
                        <option value="3">Last 3 hours</option>
                        <option value="custom">Custom (set dates below)</option>
                    </select>
                </div>

                <div class="style-group" id="radar-time-controls" data-collapsed-default="true">
                    <h3 class="group-title">Archive Time Settings</h3>
                    <label for="radar-user-tz">User Timezone</label>
                    <input id="radar-user-tz" type="text">

                    <div class="checkbox-row">
                        <label for="radar-single-frame">Single Frame Only</label>
                        <input id="radar-single-frame" type="checkbox">
                    </div>

                    <label for="radar-date-from">Date From (UTC)</label>
                    <input id="radar-date-from" type="datetime-local">

                    <div id="radar-date-to-group">
                        <label for="radar-date-to">Date To (UTC)</label>
                        <input id="radar-date-to" type="datetime-local">
                    </div>

                    <div id="radar-utc-preview"
                        style="font-size:11px; color:#7ecfff; padding:4px 8px; margin-top:6px; background:rgba(30,60,90,0.3); border:1px solid rgba(126,207,255,0.2); border-radius:4px;">
                    </div>
                </div>

                <div class="style-group" id="radar-animation-controls" data-collapsed-default="true">
                    <h3 class="group-title">Animation Settings</h3>
                    <label for="radar-frames">Frames</label>
                    <input id="radar-frames" type="range" min="1" max="150" step="1">
                    <label for="radar-fps">FPS</label>
                    <input id="radar-fps" type="range" min="1" max="30" step="1">
                </div>



                <div class="style-group" id="radar-extent-controls" data-collapsed-default="true">
                    <h3 class="group-title">Map Extent</h3>
                    <label for="radar-extent-mode">Extent Mode</label>
                    <input id="radar-extent-mode" type="range" min="0" max="1" step="1">
                    <div class="extent-mode-labels">
                        <span>Full</span>
                        <span>Custom</span>
                    </div>

                    <div id="radar-extent-custom-controls" class="extent-custom-only">
                        <button id="radar-open-map" class="secondary" type="button">Select Extent on
                            Map</button>

                        <div class="extent-bounds-grid">
                            <div class="extent-bound-field">
                                <label for="radar-n">North</label>
                                <input id="radar-n" type="number" step="0.01">
                            </div>
                            <div class="extent-bound-field">
                                <label for="radar-s">South</label>
                                <input id="radar-s" type="number" step="0.01">
                            </div>
                            <div class="extent-bound-field">
                                <label for="radar-e">East</label>
                                <input id="radar-e" type="number" step="0.01">
                            </div>
                            <div class="extent-bound-field">
                                <label for="radar-w">West</label>
                                <input id="radar-w" type="number" step="0.01">
                            </div>
                        </div>
                    </div>
                </div>

                <button id="radar-generate" class="primary" type="button">Generate Archive</button>
            </aside>

            <aside class="style-panel">
                <h2 class="section-title">Layer Controls</h2>

                <div id="layered-layer-controls" style="display:none;">
                    <div class="style-group" id="radar-layer-visibility-controls">
                        <h3 class="group-title">Layer Visibility</h3>
                        <div class="checkbox-row"><label for="layered-show-radar">Radar Layer</label><input
                                id="layered-show-radar" type="checkbox" checked></div>
                        <input id="layered-opacity-radar" type="range" min="0" max="1" step="0.05" value="1">
                        <div class="checkbox-row"><label for="layered-show-alerts">Alerts Layer</label><input
                                id="layered-show-alerts" type="checkbox" checked></div>
                        <input id="layered-opacity-alerts" type="range" min="0" max="1" step="0.05" value="0.9">
                        <div class="checkbox-row"><label for="layered-show-cities">Cities Layer</label><input
                                id="layered-show-cities" type="checkbox" checked></div>
                        <input id="layered-opacity-cities" type="range" min="0" max="1" step="0.05" value="1">
                        <div class="checkbox-row"><label for="layered-show-counties">County Lines Layer</label><input
                                id="layered-show-counties" type="checkbox" checked></div>
                        <input id="layered-opacity-counties" type="range" min="0" max="1" step="0.05" value="1">
                        <div class="checkbox-row"><label for="layered-show-states">State Outlines Layer</label><input
                                id="layered-show-states" type="checkbox" checked></div>
                        <input id="layered-opacity-states" type="range" min="0" max="1" step="0.05" value="1">
                        <div class="checkbox-row"><label for="layered-show-rings">Range Rings Layer</label><input
                                id="layered-show-rings" type="checkbox" checked></div>
                        <input id="layered-opacity-rings" type="range" min="0" max="1" step="0.05" value="1">
                    </div>
                </div>

                <div class="style-group" id="radar-layer-controls-note">
                    <h3 class="group-title">Layers</h3>
                    <p>Layer controls will appear when output is generated.</p>
                </div>
            </aside>

            <main class="display-area">
                <div id="progress-container">
                    <div id="progress-bar"></div>
                    <span id="progress-message"></span>
                </div>
                <div class="output-meta-row">
                    <span class="output-meta-label">Last Output</span>
                    <span id="source-badge" class="output-meta-badge">Source: --</span>
                    <span id="data-mode-badge" class="output-meta-badge">Data Mode: --</span>
                </div>
                <div id="layered-controls" class="layered-controls" style="display:none;">
                    <button id="layered-step-back" class="scrubber-btn" type="button"
                        title="Previous frame">&larr;</button>
                    <input id="layered-scrubber" type="range" min="0" max="0" step="1" value="0">
                    <button id="layered-step-fwd" class="scrubber-btn" type="button" title="Next frame">&rarr;</button>
                    <span id="layered-timestamp" class="layered-timestamp"></span>
                    <button id="layered-save-current" class="secondary scrubber-action-btn" type="button">Save
                        Frame</button>
                    <button id="layered-export-animation" class="secondary scrubber-action-btn" type="button">Export
                        MP4</button>
                </div>

                <div id="result-layered-container">
                    <img id="result-basemap-image" alt="Radar archive basemap">
                    <img id="result-radar-image" alt="Radar archive radar frame">
                    <img id="result-alerts-image" alt="Radar archive alerts frame">
                    <img id="result-cities-image" alt="Radar archive cities frame">
                    <img id="result-rings-overlay-image" alt="Radar archive range rings overlay frame">
                    <img id="result-counties-overlay-image" alt="Radar archive county lines overlay frame">
                    <img id="result-states-overlay-image" alt="Radar archive state outlines overlay frame">
                    <img id="result-static-overlay-image" alt="Radar archive static overlay frame">
                    <img id="result-legend-overlay-image" alt="Radar archive legend overlay frame">
                    <img id="result-hud-right-image" alt="Radar archive timestamp overlay frame">
                </div>
                <img id="result-image" alt="Generated radar archive image">
                <video id="result-video" controls></video>

                <div id="status-message"></div>
            </main>
        </div>

        <div id="map-modal" class="modal-overlay">
            <div class="modal-content">
                <div id="leaflet-map"></div>
                <button id="map-modal-close" class="secondary" type="button">Close</button>
            </div>
        </div>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
        <script src="js/shared.js"></script>
        <script src="js/radar.js"></script>
        <script>initNav('radar');</script>
    </body>

</html>
