<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Satellite — NCHurricane Dashboard</title>
        <link rel="stylesheet" href="css/shared.css">
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    </head>

    <body>
        <header>
            <h1><a href="index.html">NCHurricane Dashboard 2026</a></h1>
            <nav id="main-nav"></nav>
        </header>

        <div class="page-layout">
            <aside class="controls-panel">
                <h2 class="section-title">Satellite Controls</h2>

                <div class="style-group" id="satellite-selection-controls">
                    <h3 class="group-title">Selection Settings</h3>
                    <label for="satellite-sat-id">Satellite</label>
                    <select id="satellite-sat-id">
                        <option value="goes-east">Auto - GOES-East</option>
                        <option value="goes-west">Auto - GOES-West</option>
                        <option disabled>--------------------</option>
                        <option value="goes19">GOES-19 (02/2025 - present)</option>
                        <option value="goes18">GOES-18 (07/2022 - present)</option>
                        <option value="goes17">GOES-17 (02/2019 - 01/2023)</option>
                        <option value="goes16">GOES-16 (12/2017 - 01/2025)</option>
                    </select>

                    <label for="satellite-sector">Sector</label>
                    <select id="satellite-sector">
                        <option value="CONUS">CONUS</option>
                        <option value="FullDisk">Full Disk</option>
                        <option value="Meso1">Meso 1</option>
                        <option value="Meso2">Meso 2</option>
                    </select>

                    <label for="satellite-channel">Product</label>
                    <select id="satellite-channel">
                        <option value="Channel01">Channel 01 - Blue Visible</option>
                        <option value="Channel02">Channel 02 - Red Visible</option>
                        <option value="Channel03">Channel 03 - Veggie Near-IR</option>
                        <option value="Channel05">Channel 05 - Snow/Ice</option>
                        <option value="Channel06">Channel 06 - Cloud Particle Size</option>
                        <option value="Channel07">Channel 07 - Shortwave IR</option>
                        <option value="Channel07MetPyDRGB">Channel 07 - MetPy DRGB</option>
                        <option value="Channel07Fire">Channel 07 - Fire Detection</option>
                        <option value="Channel08">Channel 08 - Upper-Level WV</option>
                        <option value="Channel08MetPyTPC">Channel 08 - MetPy TPC</option>
                        <option value="Channel08SatpyWV2">Channel 08 - Satpy WV2</option>
                        <option value="Channel08RAMSDIS">Channel 08 - RAMSDIS WV</option>
                        <option value="Channel09">Channel 09 - Mid-Level WV</option>
                        <option value="Channel09MetPyTPC">Channel 09 - MetPy TPC</option>
                        <option value="Channel09SatpyWV2">Channel 09 - Satpy WV2</option>
                        <option value="Channel09RAMSDIS">Channel 09 - RAMSDIS WV</option>
                        <option value="Channel10">Channel 10 - Low-Level WV</option>
                        <option value="Channel10MetPyTPC">Channel 10 - MetPy TPC</option>
                        <option value="Channel10SatpyWV2">Channel 10 - Satpy WV2</option>
                        <option value="Channel10RAMSDIS">Channel 10 - RAMSDIS WV</option>
                        <option value="Channel11">Channel 11 - Cloud-Top Phase</option>
                        <option value="Channel13" selected>Channel 13 - Clean IR</option>
                        <option value="Channel13Satpy">Channel 13 - Satpy IR Clouds</option>
                        <option value="Channel13MetPyTPC">Channel 13 - MetPy TPC</option>
                        <option value="Channel13MetPyTV1">Channel 13 - MetPy TV1</option>
                        <option value="Channel13MetPyBD">Channel 13 - MetPy BD</option>
                        <option value="Channel13MetPyRGBV">Channel 13 - MetPy RGBV</option>
                        <option value="Channel13MetPyDRGB">Channel 13 - MetPy DRGB</option>
                        <option value="Channel13CIRAWinter">Channel 13 - CIRA Winter</option>
                        <option value="Channel14">Channel 14 - Longwave IR</option>
                        <option value="Channel14MetPyTV1">Channel 14 - MetPy TV1</option>
                        <option value="Channel14MetPyBD">Channel 14 - MetPy BD</option>
                        <option value="Channel14CIRA">Channel 14 - CIRA Enhanced</option>
                        <option value="Channel14CIRAWinter">Channel 14 - CIRA Winter</option>
                        <option value="Channel15">Channel 15 - Dirty Longwave</option>
                        <option value="GeoColor">GeoColor</option>
                        <option value="GeoColorBlkMar">GeoColor Black Marble</option>
                        <option value="TrueColor">True Color</option>
                        <option value="NaturalColor">Natural Color</option>
                        <option value="DayNightHybrid">Day/Night Hybrid</option>
                        <option value="Sandwich">VIS/IR Sandwich</option>
                        <option value="FireTemperature">Fire Temperature</option>
                        <option value="AirMass">Air Mass</option>
                        <option value="WaterVapor">Simple Water Vapor</option>
                        <option value="DifferentialWaterVapor">Differential Water Vapor</option>
                        <option value="DayConvection">Day Convection</option>
                        <option value="DayCloudConvection">Day Cloud Convection</option>
                        <option value="DayCloudPhase">Day Cloud Phase</option>
                        <option value="DayCloudPhaseEUMETSAT">Day Cloud Phase EUMETSAT</option>
                        <option value="DayLandCloud">Day Land Cloud</option>
                        <option value="DayLandCloudFire">Day Land Cloud Fire</option>
                        <option value="DaySnowFog">Day Snow/Fog</option>
                        <option value="NighttimeMicrophysics">Nighttime Microphysics</option>
                        <option value="Dust">Dust</option>
                        <option value="Ash">Ash</option>
                        <option value="SulfurDioxide">Sulfur Dioxide</option>
                        <option value="SplitWindowDifference">Split Window Difference</option>
                        <option value="NightFogDifference">Night Fog Difference</option>
                        <option value="BlowingSnow">Blowing Snow</option>
                        <option value="SeaSpray">Sea Spray</option>
                        <option value="RocketPlume">Rocket Plume</option>
                    </select>

                    <label for="satellite-source">Source</label>
                    <select id="satellite-source">
                        <option value="aws" selected>AWS</option>
                        <option value="gcp">GCP</option>
                    </select>
                </div>

                <div class="style-group" id="satellite-lookback-controls" data-collapsed-default="false">
                    <h3 class="group-title">Scrubber Lookback</h3>
                    <label for="satellite-lookback-hours">Time Window</label>
                    <select id="satellite-lookback-hours">
                        <option value="1">Last 1 hour</option>
                        <option value="2" selected>Last 2 hours</option>
                        <option value="3">Last 3 hours</option>
                        <option value="6">Last 6 hours</option>
                    </select>
                </div>

                <button id="satellite-generate" class="primary" type="button">Load Live + Scrubber</button>
            </aside>

            <aside class="style-panel">
                <h2 class="section-title">Playback</h2>
                <div class="style-group">
                    <h3 class="group-title">Frame Status</h3>
                    <p id="satellite-frame-meta" class="zorder-hint">No frames loaded.</p>
                </div>
            </aside>

            <main class="display-area">
                <div id="progress-container">
                    <div id="progress-bar"></div>
                    <span id="progress-message"></span>
                </div>
                <div class="output-meta-row">
                    <span class="output-meta-label">Last Output</span>
                    <span id="source-badge" class="output-meta-badge">Source: --</span>
                    <span id="data-mode-badge" class="output-meta-badge">Data Mode: --</span>
                </div>
                <div id="scrubber-controls" class="layered-controls" style="display: none;">
                    <button id="scrubber-step-back" class="scrubber-btn" type="button"
                        title="Previous frame">&larr;</button>
                    <input id="scrubber-range" type="range" min="0" max="0" step="1" value="0">
                    <button id="scrubber-step-fwd" class="scrubber-btn" type="button" title="Next frame">&rarr;</button>
                    <span id="scrubber-timestamp" class="layered-timestamp"></span>
                </div>
                <div id="satellite-map" aria-label="Satellite Leaflet Map"></div>
                <div id="status-message"></div>
            </main>
        </div>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script src="js/shared.js"></script>
        <script src="js/satellite.js"></script>
        <script>initNav('satellite');</script>
    </body>

</html>
